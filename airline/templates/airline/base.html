<!DOCTYPE html>
<html>
<head>
  <title>Airline System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { background: #f4f6f9; margin: 0; font-family: sans-serif; }

    .nav-wrap {
      background: #0C447C;
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: white;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: -0.2px;
    }
    .nav-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-btn {
      height: 32px;
      padding: 0 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      border: none;
      transition: opacity 0.15s;
    }
    .nav-btn:hover { opacity: 0.85; }
    .nav-btn-ghost {
      background: rgba(255,255,255,0.12);
      color: white;
    }
    .nav-btn-light {
      background: white;
      color: #0C447C;
    }
    .nav-btn-danger {
      background: #c0392b;
      color: white;
    }

    .page-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="date"],
    select {
      width: 100%;
      height: 42px;
      padding: 0 12px;
      border: 0.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      color: #333;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
      appearance: auto;
    }
    input:focus, select:focus {
      border-color: #0C447C;
    }
  </style>
</head>
<body>

{% if request.path != '/login/' and request.path != '/signup/' %}
<nav class="nav-wrap">
  <a href="{% url 'home' %}" class="nav-brand">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0 0 11.5 2h0A1.5 1.5 0 0 0 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z" fill="white" fill-opacity="0.9"/>
    </svg>
    Airline System
  </a>

  <div class="nav-actions">
    {% if user.is_authenticated %}
      <a href="{% url 'home' %}" class="nav-btn nav-btn-ghost">Home</a>
      <a href="{% url 'profile' %}" class="nav-btn nav-btn-ghost">Profile</a>
      <form action="{% url 'logout' %}" method="POST" style="display:inline; margin:0;">
        {% csrf_token %}
        <button type="submit" class="nav-btn nav-btn-danger">Logout</button>
      </form>
    {% else %}
      <a href="{% url 'login' %}" class="nav-btn nav-btn-ghost">Login</a>
      <a href="{% url 'signup' %}" class="nav-btn nav-btn-light">Sign up</a>
    {% endif %}
  </div>
</nav>
{% endif %}

<div class="page-wrap">
  {% block content %}
  {% endblock %}
</div>

</body>
</html>
